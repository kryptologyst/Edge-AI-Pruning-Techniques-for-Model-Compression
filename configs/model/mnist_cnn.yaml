# Model configurations
_target_: src.models.models.MNISTCNN

# Model architecture
input_shape: [28, 28, 1]
num_classes: 10
hidden_size: 100
dropout_rate: 0.2

# Model variants
variants:
  small:
    hidden_size: 50
    dropout_rate: 0.1
  medium:
    hidden_size: 100
    dropout_rate: 0.2
  large:
    hidden_size: 200
    dropout_rate: 0.3
